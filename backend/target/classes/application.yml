spring:
  application:
    name: shop-qr
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/shopqr
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

logging:
  level:
    org.springframework.security: DEBUG
