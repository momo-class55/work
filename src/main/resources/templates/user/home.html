<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>홈 · Shop QR</title>
  <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
  <div class="layout">
    <div class="header-row">
      <div>
        <p class="welcome">안녕하세요,</p>
        <p class="user-name" th:text="${user.name} + ' 님'">홍길동 님</p>
      </div>
      <form th:action="@{/logout}" method="post">
        <button type="submit" class="logout" style="background:none;border:none;cursor:pointer;font-size:1rem;">로그아웃</button>
      </form>
    </div>

    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.5rem;">
        <h2 style="margin:0;">오늘의 메뉴</h2>
        <span th:if="${menu != null}" style="color:var(--blue);font-size:0.9rem;" th:text="${menu.menuDate}">2026-04-01</span>
      </div>
      <p class="menu-content" th:if="${menu != null}" th:text="${menu.content}">메뉴 내용</p>
      <p class="menu-content muted" th:if="${menu == null}">등록된 메뉴가 없습니다.</p>
    </div>

    <div id="qr-panel" class="qr-wrap" style="display:none;">
      <img id="qr-img" alt="식사 QR" width="280" height="280">
      <p id="timer" class="timer">남은 시간: 60초</p>
      <p class="muted">리더기에 표시된 QR을 스캔해 주세요.</p>
      <button type="button" class="btn-ghost" id="btn-close-qr">닫기</button>
    </div>

    <button type="button" class="btn-dark" id="btn-open-qr" style="width:100%;">QR 생성</button>
  </div>

  <script th:inline="javascript">
    (function () {
      var qrBase = /*[[@{/user/qr.png}]]*/ '/user/qr.png';
      var panel = document.getElementById('qr-panel');
      var btnOpen = document.getElementById('btn-open-qr');
      var btnClose = document.getElementById('btn-close-qr');
      var img = document.getElementById('qr-img');
      var timerEl = document.getElementById('timer');
      var left = 60;
      var handle = null;

      function tick() {
        left--;
        timerEl.textContent = '남은 시간: ' + left + '초';
        if (left <= 0) {
          clearInterval(handle);
          handle = null;
          panel.style.display = 'none';
          btnOpen.style.display = 'block';
        }
      }

      btnOpen.addEventListener('click', function () {
        left = 60;
        img.src = qrBase + '?t=' + Date.now();
        panel.style.display = 'block';
        btnOpen.style.display = 'none';
        timerEl.textContent = '남은 시간: 60초';
        if (handle) clearInterval(handle);
        handle = setInterval(tick, 1000);
      });

      btnClose.addEventListener('click', function () {
        if (handle) clearInterval(handle);
        handle = null;
        panel.style.display = 'none';
        btnOpen.style.display = 'block';
      });
    })();
  </script>
</body>
</html>
